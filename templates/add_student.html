<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Student</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body {
    margin: 0;
    padding: 20px;

    min-height: 100vh;   /* ✅ important */

    display: flex;
    justify-content: center;
    align-items: flex-start;   /* 🔥 FIX HEADER CUT */

    background: linear-gradient(135deg, #6366f1, #8b5cf6);
}

.form-wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 10px 0;
}

.form-card {
    width: 100%;
    max-width: 520px;

    margin: 0 auto;

    padding: 18px;

    display: flex;
    flex-direction: column;
}

/* FORM CARD */

.form-card h2 {
    margin-bottom: 20px;
}

.form-card input,
.form-card select {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.form-card button:not(.back-btn) {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    color: white;
    font-weight: 600;
    cursor: pointer;
}

.back-btn {
    position: absolute;
    top: 20px;
    left: 20px;

    width: auto;
    display: inline-block;

    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    color: white;

    border: none;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 500;

    transition: 0.2s;   /* ✅ INSIDE */
}

/* ✅ OUTSIDE */
.back-btn:hover {
    transform: scale(1.05);
}

/* 🔥 FIX LABEL VISIBILITY ONLY FOR ADD PAGE */

.form-section h3 {
    color: #333 !important;
    text-shadow: none !important;
}

.coolinput label {
    color: #444 !important;
    background: rgba(255,255,255,0.9) !important;
    backdrop-filter: blur(6px);
    text-shadow: none !important;
}

</style>

</head>

<body>

<div class="form-wrapper">
    <div class="form-card modern-form">
<button onclick="window.location.href='/dashboard'" class="back-btn">
    ← Back
</button>
    <h2>Add Student</h2>

    <form method="POST" class="modern-form">

        <!-- 🔹 PERSONAL DETAILS -->
        <div class="form-section">
            <h3>👤 Personal Details</h3>

            <div class="grid">
                <div class="cut-input">
                    <label>Full Name</label>
                <input type="text" name="name" placeholder=" " required>
                <span class="error-text">Name is required</span>
            </div>

            <div class="cut-input">
                <label>Date of Birth</label>
                <input type="date" name="dob" placeholder=" ">
            </div>

            <div class="cut-input">
                <label>Gender</label>
                <select name="gender" required onchange="this.setAttribute('value', this.value)">
                    <option value="" disabled selected hidden>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="non-binary">non-binary</option>
                    <option value="gender-fluid">gender-fluid</option>
                    <option value="agender">agender</option>
                    <option value="bigender">bigender</option>
                    <option value="transgender">transgender</option>
                </select>
            </div>

            <div class="cut-input">
                <label>Email</label>
                <input type="email" name="email" placeholder=" ">
                <span class="error-text">Invalid email</span>
            </div>

            <div class="cut-input">
                <label>Phone</label>
                <input type="text" name="phone" placeholder=" ">
                <span class="error-text">Enter valid number</span>
            </div>

            <div class="cut-input" style="grid-column: span 2;">
                <label>Address</label>
                <input type="text" name="address">
            </div>
        </div>

        <!-- 🔹 ACADEMIC DETAILS -->
        <div class="form-section">
            <h3>🎓 Academic Details</h3>

            <div class="grid">
                <div class="cut-input">
                    <label>Degree / Course</label>
                    <input type="text" name="degree" placeholder=" ">
                </div>

                <div class="cut-input">
                    <label>Admission Date</label>
                    <input type="date" name="admission_date" placeholder=" ">
                </div>
            </div>
        </div>

        <!-- 🔹 SUBJECT SCORES -->
         <div class="form-section">
            <h3>📊 Subject Scores</h3>

            <div class="grid">

                <div class="cut-input">
                    <label>Math</label>
                    <input type="number" name="math" placeholder=" ">
                    <span class="error-text">0–100 only</span>
                </div>

                <div class="cut-input">
                    <label>Science</label>
                    <input type="number" name="science" placeholder=" ">
                    <span class="error-text">0–100 only</span>
                </div>

                <div class="cut-input" style="grid-column: span 2;">
                    <label>English</label>
                    <input type="number" name="english" placeholder=" ">
                    <span class="error-text">0–100 only</span>
                </div>
            </div>
         </div>

         <!-- 🔹 ACTION BUTTONS -->
        <div class="form-actions">
            <button type="button" class="cancel-btn" onclick="window.location.href='/dashboard'">Cancel</button>
            <button type="submit" class="submit-btn">Add Student</button>
        </div>
    </form>
    
    </div>
</div>

</body>
</html>
