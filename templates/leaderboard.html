<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="main">
    <h1>🏆 Leaderboard</h1>

    <table border="1" width="100%" cellpadding="10">
        <tr>
            <th>Rank</th>
            <th>Name</th>
            <th>Score</th>
        </tr>

        {% for s in students %}
        <tr>
            <td>#{{ loop.index }}</td>
            <td>{{ s.name }}</td>
            <td>{{ s.score }}</td>
        </tr>
        {% endfor %}

    </table>

    <br>
    <a href="/dashboard">← Back to Dashboard</a>

</div>

</body>
</html>
